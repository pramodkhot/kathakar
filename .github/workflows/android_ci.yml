name: Kathakar Android CI

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # google-services.json is committed directly to repo — no secret needed
      - name: Verify google-services.json
        run: |
          echo "=== google-services.json content ==="
          cat app/google-services.json
          echo ""
          echo "Size: $(wc -c < app/google-services.json) bytes"
          if grep -q "certificate_hash" app/google-services.json; then
            echo "✅ certificate_hash found - Google Sign-In will work!"
          else
            echo "❌ certificate_hash NOT found!"
            exit 1
          fi

      - name: Setup fixed debug keystore
        env:
          DEBUG_KEYSTORE_BASE64: ${{ secrets.DEBUG_KEYSTORE_BASE64 }}
        run: |
          mkdir -p ~/.android
          echo "$DEBUG_KEYSTORE_BASE64" | base64 -d > ~/.android/debug.keystore
          echo "Keystore written"

      - name: Print SHA-1 fingerprint
        run: |
          echo "=================================================="
          keytool -list -v \
            -keystore ~/.android/debug.keystore \
            -alias androiddebugkey \
            -storepass android \
            -keypass android 2>/dev/null | grep -E "SHA1:|SHA256:"
          echo "=================================================="

      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/
          echo "/tmp/gradle-8.4/bin" >> $GITHUB_PATH

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Kathakar-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Done
        if: success()
        run: ls -lh app/build/outputs/apk/debug/
