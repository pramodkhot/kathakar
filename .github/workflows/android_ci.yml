name: Kathakar Android CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Write google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" > app/google-services.json

      - name: Verify google-services.json
        run: |
          if [ -f "app/google-services.json" ]; then
            echo "google-services.json OK — $(wc -c < app/google-services.json) bytes"
          else
            echo "MISSING: Add GOOGLE_SERVICES_JSON secret"
            exit 1
          fi

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Install Gradle 8.7 directly
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle
          echo "/tmp/gradle/gradle-8.7/bin" >> $GITHUB_PATH

      - name: Verify Gradle
        run: gradle --version

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('gradle/libs.versions.toml', 'app/build.gradle.kts') }}
          restore-keys: gradle-

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Kathakar-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Confirm APK built
        if: success()
        run: |
          echo "BUILD SUCCESSFUL"
          ls -lh app/build/outputs/apk/debug/
