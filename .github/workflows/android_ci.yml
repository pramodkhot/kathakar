name: Kathakar Android CI

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Write google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" > app/google-services.json

      - name: Verify google-services.json
        run: |
          if [ -f "app/google-services.json" ] && [ -s "app/google-services.json" ]; then
            echo "OK: $(wc -c < app/google-services.json) bytes"
          else
            echo "ERROR: Add GOOGLE_SERVICES_JSON secret in Settings > Secrets > Actions"
            exit 1
          fi

      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/
          echo "/tmp/gradle-8.4/bin" >> $GITHUB_PATH

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Print SHA-1 fingerprint
        run: |
          echo "=== SHA-1 for Firebase ==="
          keytool -list -v \
            -keystore ~/.android/debug.keystore \
            -alias androiddebugkey \
            -storepass android \
            -keypass android 2>/dev/null | grep "SHA1:"
          echo "=== Copy the SHA1 above and add it to Firebase Console ==="
          echo "Firebase Console > Project Settings > Your Apps > Add Fingerprint"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Kathakar-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build Success
        if: success()
        run: ls -lh app/build/outputs/apk/debug/
